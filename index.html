<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-6 美食地方列表</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss02.css">
    <style>
        .roller {
            position: relative;
            overflow: hidden;
        }

        .roller .rollerbox01 {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);

            display: flex;
            /* 讓它變成 Flex 容器 */
            justify-content: center;
            /* 水平置中按鈕 */
            align-items: center;
            /* 垂直置中按鈕 */

            left: -100%;
            transition: left 1s ease-in-out;
        }

        .roller:hover .rollerbox01 {
            left: 0;
        }

        .card-img-top {
            height: 200px;
            object-fit: cover;
            /* 這樣圖片才不會變形 */
        }
    </style>

</head>

<body>
    <div class="title-03 text-center">農村地方美食列表</div>
    <br>
    <div class="container">
        <div class="row row-cols-1 row-cols-sm-1 row-cols-md-2 row-cols-lg-3 g-4" id="mycol">
            <div class="col">
                <div class="card h-100 roller">
                    <div class="rollerbox01">
                        <div class="btn btn-success">See more</div>
                    </div>
                    <img src="images/950-600x400.jpg" class="card-img-top" alt="這是測試照片">
                    <div class="card-body">
                        <h4 class="card-title">這是店家名稱</h4>
                        <p class="card-text">
                        <h6>店家電話: 這是店家電話</h6>
                        <h6>店家地址: 這是店家地址這是店家地址這是店家地址</h6>
                        店家簡介:
                        小區你說獲得保健如果您上帝，更是但是，和諧日報雲林一句話高興網路老師為您和平島照片付款招商智能美麗，每個種類保護下了科學找到關西魯蛇這時本科這就是多個觀眾她的，計劃以及看見推坑王，長時間你也三大，配。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.min.js"></script>
    <script>
        // 主程式
        $(function () {
            //串接opendata
            $.ajax({
                type: "GET",
                url: "js/json/TravelFood.json",
                dataType: "JSON",
                success: showdata,
                error: function () {
                    console.log("Error - js/jason/TravelFood.json");
                }
            })
        });
        function showdata(data) {
            // 1. 讓console讀取資料, 測試用
            console.log(data);
            // 2. 清空原本寫死在 HTML 裡的範例資料
            $("#mycol").empty();
            // 3. 遍歷資料
            data.forEach(function (item) {
                // 4. JSON無資料時的替代顯示
                let img = item.PicURL ? item.PicURL : "images/950-600x400.jpg";
                let tel = item.Tel ? item.Tel : "未提供電話";
                let hword = item.HostWords ? item.HostWords : "未提供簡介";
                // 如果 Url 為空，則 href 設為 javascript:void(0)
                let webUrl = item.Url ? item.Url : "javascript:void(0)";

                let strHTML = `
                    <div class="col">
                    <div class="card h-100 roller">
                    <div class="rollerbox01">
                    <a class="btn btn-primary" href="${webUrl}" role="button">店家官網</a>
                    </div>
                    <img src="${img}" class="card-img-top" alt="${item.Name}">
                    <div class="card-body">
                        <h4 class="card-title">${item.Name}</h4>
                        <p class="card-text">
                            <h6>店家電話: ${tel}</h6>
                            <h6>店家地址: ${item.City}${item.Town}${item.Address}</h6>
                            店家簡介: ${hword}<br>
                        </p>
                    </div>
                    </div>
                    </div>
                 `;
                $("#mycol").append(strHTML);
            })
        }

    </script>
</body>

</html>
